<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>edgetunnel Admin</title>
  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --brand: #6ee7ff;
      --brand2: #a78bfa;
      --danger: #fb7185;
      --ok: #34d399;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    html,body{height:100%}
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1200px 800px at 15% 20%, rgba(110,231,255,.18), transparent 60%),
        radial-gradient(900px 700px at 75% 30%, rgba(167,139,250,.18), transparent 55%),
        radial-gradient(900px 700px at 50% 90%, rgba(52,211,153,.10), transparent 60%),
        var(--bg);
    }
    a{color:inherit}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 40px}
    .top{
      display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;
      margin-bottom:18px;
    }
    .brand{
      display:flex;align-items:center;gap:12px;
    }
    .logo{
      width:42px;height:42px;border-radius:14px;
      background: linear-gradient(135deg, rgba(110,231,255,.8), rgba(167,139,250,.8));
      box-shadow: 0 10px 35px rgba(0,0,0,.35);
    }
    h1{font-size:18px;margin:0;letter-spacing:.2px}
    .sub{font-size:13px;color:var(--muted);margin-top:2px}

    .grid{display:grid;grid-template-columns: 1.2fr .8fr; gap:16px}
    @media (max-width: 960px){ .grid{grid-template-columns:1fr} }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
      backdrop-filter: blur(10px);
    }
    .card h2{font-size:14px;margin:0 0 10px 0;color:rgba(255,255,255,.88)}

    .row{display:flex;gap:10px;flex-wrap:wrap}
    .pill{font-size:12px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);padding:6px 10px;border-radius:999px}

    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
    input,select,textarea{
      width:100%;
      box-sizing:border-box;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 10px 12px;
      outline:none;
    }
    textarea{min-height:120px;font-family:var(--mono);font-size:12px;line-height:1.45}
    input:focus,textarea:focus{border-color: rgba(110,231,255,.55); box-shadow:0 0 0 4px rgba(110,231,255,.12)}

    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{
      border:0;
      border-radius: 14px;
      padding: 10px 12px;
      color: rgba(10,15,25,.95);
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(110,231,255,.95), rgba(167,139,250,.92));
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
    }
    button.secondary{background:rgba(255,255,255,.10);color:var(--text);border:1px solid rgba(255,255,255,.14);box-shadow:none}
    button.danger{background:rgba(251,113,133,.92);color:#22060b}
    button:disabled{opacity:.6;cursor:not-allowed}

    .toast{margin-top:10px;font-size:12px;color:var(--muted)}
    .ok{color: var(--ok)}
    .bad{color: var(--danger)}

    .kv{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    @media (max-width:560px){.kv{grid-template-columns:1fr}}

    code{font-family:var(--mono);font-size:12px}
    .footer{margin-top:16px;color:var(--muted);font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>edgetunnel Admin</h1>
          <div class="sub">更干净的布局 · 更清晰的操作 · 适合个人自用</div>
        </div>
      </div>
      <div class="row">
        <span class="pill" id="hostPill">host: -</span>
        <span class="pill" id="verPill">status: loading</span>
        <a class="pill" href="/logout" title="logout">logout</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>核心配置（config.json）</h2>
        <label>配置 JSON（支持直接编辑，保存后写入 KV）</label>
        <textarea id="configText" spellcheck="false" placeholder="Loading /admin/config.json ..."></textarea>
        <div class="actions">
          <button id="btnSaveConfig">保存配置</button>
          <button class="secondary" id="btnReloadConfig">重新加载</button>
        </div>
        <div class="toast" id="configToast"></div>
      </div>

      <div class="card">
        <h2>常用工具</h2>

        <div class="kv">
          <div>
            <label>Telegram BotToken</label>
            <input id="tgToken" placeholder="123456:ABC..." />
          </div>
          <div>
            <label>Telegram ChatID</label>
            <input id="tgChat" placeholder="123456789" />
          </div>
        </div>
        <div class="actions">
          <button class="secondary" id="btnSaveTG">保存 TG 配置</button>
          <button class="danger" id="btnResetTG">重置 TG 配置</button>
        </div>
        <div class="toast" id="tgToast"></div>

        <hr style="border:0;border-top:1px solid rgba(255,255,255,.10);margin:14px 0" />

        <label>自定义优选 IP（ADD.txt）</label>
        <textarea id="addText" spellcheck="false" placeholder="每行一个 IP / domain[:port] ..."></textarea>
        <div class="actions">
          <button class="secondary" id="btnSaveADD">保存 ADD.txt</button>
          <button class="secondary" id="btnReloadADD">加载 ADD.txt</button>
        </div>
        <div class="toast" id="addToast"></div>

        <div class="footer">
          提示：此页面是静态前端，真正的读写由 Worker 的 <code>/admin/*</code> API 完成。
        </div>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const api = {
    config: '/admin/config.json',
    saveConfig: '/admin/config.json',
    tg: '/admin/tg.json',
    add: '/admin/ADD.txt'
  };

  function setToast(el, msg, ok=true){
    el.textContent = msg;
    el.className = 'toast ' + (ok ? 'ok' : 'bad');
  }

  async function fetchText(url){
    const r = await fetch(url, { cache: 'no-store' });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return await r.text();
  }

  async function fetchJson(url){
    const r = await fetch(url, { cache: 'no-store' });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  }

  async function loadAll(){
    $('hostPill').textContent = 'host: ' + location.host;
    $('verPill').textContent = 'status: ready';

    // config
    try{
      $('configText').value = await fetchText(api.config);
      $('configToast').textContent = '';
    }catch(e){
      setToast($('configToast'), '加载 config 失败：' + e.message, false);
    }

    // tg
    try{
      const tg = await fetchJson(api.tg);
      $('tgToken').value = tg.BotToken || '';
      $('tgChat').value = tg.ChatID || '';
      $('tgToast').textContent = '';
    }catch(e){
      // ignore if not set
      $('tgToast').textContent = 'TG 配置尚未初始化/读取失败：' + e.message;
    }

    // add
    await reloadADD();
  }

  async function reloadADD(){
    try{
      $('addText').value = await fetchText(api.add);
      $('addToast').textContent = '';
    }catch(e){
      setToast($('addToast'), '加载 ADD.txt 失败：' + e.message, false);
    }
  }

  $('btnReloadConfig').addEventListener('click', loadAll);

  $('btnSaveConfig').addEventListener('click', async () => {
    const t = $('configText').value;
    try{
      JSON.parse(t);
    }catch(e){
      return setToast($('configToast'), 'JSON 语法错误：' + e.message, false);
    }

    $('btnSaveConfig').disabled = true;
    try{
      const r = await fetch(api.saveConfig, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: t
      });
      const j = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
      setToast($('configToast'), j.message || '已保存', true);
    }catch(e){
      setToast($('configToast'), '保存失败：' + e.message, false);
    }finally{
      $('btnSaveConfig').disabled = false;
    }
  });

  $('btnSaveTG').addEventListener('click', async () => {
    const payload = { BotToken: $('tgToken').value.trim(), ChatID: $('tgChat').value.trim() };
    $('btnSaveTG').disabled = true;
    try{
      const r = await fetch(api.tg, {
        method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify(payload)
      });
      const j = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
      setToast($('tgToast'), j.message || 'TG 已保存', true);
    }catch(e){
      setToast($('tgToast'), 'TG 保存失败：' + e.message, false);
    }finally{
      $('btnSaveTG').disabled = false;
    }
  });

  $('btnResetTG').addEventListener('click', async () => {
    $('btnResetTG').disabled = true;
    try{
      const r = await fetch(api.tg, {
        method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({ init: true })
      });
      const j = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
      $('tgToken').value = '';
      $('tgChat').value = '';
      setToast($('tgToast'), 'TG 已重置', true);
    }catch(e){
      setToast($('tgToast'), 'TG 重置失败：' + e.message, false);
    }finally{
      $('btnResetTG').disabled = false;
    }
  });

  $('btnReloadADD').addEventListener('click', reloadADD);

  $('btnSaveADD').addEventListener('click', async () => {
    const payload = $('addText').value;
    $('btnSaveADD').disabled = true;
    try{
      const r = await fetch(api.add, { method:'POST', body: payload });
      const j = await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
      setToast($('addToast'), j.message || 'ADD.txt 已保存', true);
    }catch(e){
      setToast($('addToast'), 'ADD.txt 保存失败：' + e.message, false);
    }finally{
      $('btnSaveADD').disabled = false;
    }
  });

  loadAll();
</script>
</body>
</html>
