<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login · edgetunnel</title>
  <style>
    :root{--bg:#0b1220;--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.65);--brand:#6ee7ff;--brand2:#a78bfa;--panel:rgba(255,255,255,.07);--mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;--sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
    html,body{height:100%}
    body{margin:0;font-family:var(--sans);color:var(--text);background:radial-gradient(1200px 800px at 20% 10%, rgba(110,231,255,.18), transparent 55%),radial-gradient(900px 700px at 80% 20%, rgba(167,139,250,.18), transparent 55%),var(--bg);display:grid;place-items:center;padding:18px;}
    .card{width:min(520px,100%);background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;box-shadow:0 18px 50px rgba(0,0,0,.25);backdrop-filter: blur(10px)}
    .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg, rgba(110,231,255,.85), rgba(167,139,250,.85));box-shadow:0 10px 35px rgba(0,0,0,.35)}
    h1{margin:12px 0 4px;font-size:18px}
    p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}
    label{display:block;margin:14px 0 6px;color:var(--muted);font-size:12px}
    input{width:100%;box-sizing:border-box;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.18);color:var(--text);padding:10px 12px;outline:none}
    input:focus{border-color: rgba(110,231,255,.55); box-shadow:0 0 0 4px rgba(110,231,255,.12)}
    button{margin-top:12px;width:100%;border:0;border-radius:14px;padding:10px 12px;font-weight:800;cursor:pointer;color:rgba(10,15,25,.95);background:linear-gradient(135deg, rgba(110,231,255,.95), rgba(167,139,250,.92));box-shadow:0 12px 30px rgba(0,0,0,.22)}
    .hint{margin-top:12px;font-size:12px;color:var(--muted)}
    code{font-family:var(--mono);font-size:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo" aria-hidden="true"></div>
    <h1>登录后台</h1>
    <p>输入 Worker 环境变量 <code>ADMIN</code> 对应的密码。登录成功后会跳转到 <code>/admin</code>。</p>

    <form method="POST" action="/login">
      <label>管理员密码</label>
      <input name="password" type="password" autocomplete="current-password" placeholder="ADMIN 密码" required />
      <button type="submit">登录</button>
    </form>

    <div class="hint">如果提示未设置 ADMIN / KV，请检查 Workers 环境变量与 KV 绑定。</div>
  </div>
</body>
</html>
